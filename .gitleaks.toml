[extend]
useDefault = true

# Every exemption below trips only the default generic-api-key rule (verified),
# so each is attached as a rule-scoped allowlist. Top-level [[allowlists]] are
# silently ignored under `[extend] useDefault = true` in gitleaks 8.24.3; only
# [[rules.allowlists]] merge into the extended rule.
[[rules]]
id = "generic-api-key"

# Deterministic dev-only seed-crypto cache committed for fast CI seeding (see
# .gitignore). Files hold OPAQUE/ECIES output for fixed dev personas + dev
# password + dev OPAQUE_MASTER_SECRET — high entropy but not secret.
[[rules.allowlists]]
description = "Dev-only seed-crypto cache; whole files exempt by path."
paths = ['''^scripts/\.cache/seed-crypto/.*\.json$''']

# Inert base64 fixtures in stream-handler.test.ts. Each string decodes to a
# human-readable label ('wrapped-b', 'user-wrapped', 'ai_wrapped') used as
# opaque envelope bytes in SSE writer tests. AND-pins them to that one file.
[[rules.allowlists]]
description = "Stream-handler SSE test fixtures; AND-pins the exact secrets to that file."
condition = "AND"
paths = ['''^apps/api/src/lib/stream-handler\.test\.ts$''']
regexTarget = "secret"
regexes = [
  '''^d3JhcHBlZC1i$''',
  '''^dXNlci13cmFwcGVk$''',
  '''^YWlfd3JhcHBlZA==$''',
]

# Two high-entropy base64 chunks of bundled demo media (public-domain JPEG +
# H.264 video). The rule's value capture spills from one array element onto the
# next, so the flagged "secret" is the line after each reported start line.
# Inert media bytes, not credentials.
[[rules.allowlists]]
description = "Demo media base64 chunks in media-assets.ts; AND-pins the exact captured secrets to that file."
condition = "AND"
paths = ['''^apps/web/src/demo/mock-backend/media-assets\.ts$''']
regexTarget = "secret"
regexes = [
  '''^eNxNjdgoXYa/jI\+Z/My2tAkv7qwFfzUvBbqIIxVR8sL9ZLoGSaW88HLj3DUovzfo35lyX3txgW1eSnI9Icb6DmE3ACZXEQMvUtTZacdcaDA5$''',
  '''^ApWrpwhm\+w17ZLA/uR3O0719kCuODqQImCywb3DGkFjXKXWXKJv83mjb19wVAUSxBttmyyj1jwMgbyxvXHAcjjCXzB8g1gskTzWzD0BXuenu$''',
]
