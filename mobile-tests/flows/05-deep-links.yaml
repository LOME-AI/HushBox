appId: ai.hushbox.app
name: Deep links are gated by the route allowlist
tags:
  - must
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 45000

# Leave home first so the assertion below is non-vacuous: otherwise "deep link
# did nothing" and "deep link fell back to home" look identical.
- tapOn: 'Sign up'
- extendedWaitUntil:
    visible: 'Create your account'
    timeout: 10000

# /login is not deep-linkable: the handler rejects auth routes and falls back to
# home, so this must leave signup and land on home, not open the login page.
- openLink: https://hushbox.ai/login
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 10000
- assertVisible: 'Sign up'
- assertNotVisible: 'Welcome back'
- assertNotVisible: 'Create your account'
