appId: ai.hushbox.app
name: Message list scrolls correctly
tags:
  - should
androidWebViewHierarchy: devtools
env:
  TEST_EMAIL: test-alice@test.hushbox.ai
  TEST_PASSWORD: password123
---
- launchApp:
    clearState: true

# Wait for app to stabilize
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000

# Open sidebar and navigate to login
- tapOn: 'Open menu'
- tapOn: 'Trial User'
- tapOn: 'Log In'
- extendedWaitUntil:
    visible: 'Welcome back'
    timeout: 10000
- tapOn: 'Email or Username'
- inputText: ${TEST_EMAIL}
- hideKeyboard
- tapOn: 'Password'
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn: 'Log in'

# Wait for authenticated chat page (use element unique to chat, not login page)
- extendedWaitUntil:
    visible: 'Select model'
    timeout: 15000

# Send multiple messages to create scrollable content (hintText not matched by tapOn)
- tapOn:
    point: '50%,35%'
- inputText: 'First message for scroll test'
- tapOn: 'Send'
- extendedWaitUntil:
    visible: 'Type a message...'
    timeout: 15000

- tapOn: 'Type a message...'
- inputText: 'Second message for scroll test'
- tapOn: 'Send'
- extendedWaitUntil:
    visible: 'Type a message...'
    timeout: 15000

# Scroll up to verify earlier messages are reachable
- scroll
- waitForAnimationToEnd
