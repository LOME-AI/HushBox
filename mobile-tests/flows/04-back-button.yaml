appId: ai.hushbox.app
name: Android hardware back button navigates correctly
tags:
  - must
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000

# Open sidebar and navigate to login page
- tapOn: 'Open menu'
- tapOn: 'Trial User'
- tapOn: 'Log In'
- extendedWaitUntil:
    visible: 'Welcome back'
    timeout: 10000

# Press hardware back button — should navigate back to chat
- back
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 10000

# Verify we returned to the chat page
- assertVisible: 'Sign up'
