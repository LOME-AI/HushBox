appId: ai.hushbox.app
name: Android hardware back button navigates correctly
tags:
  - must
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 45000

# /login is not deep-linkable (auth routes fall back to home), so build history
# via in-app links: trial home -> signup -> login.
- tapOn: 'Sign up'
- extendedWaitUntil:
    visible: 'Create your account'
    timeout: 10000

# signup -> login: a second history entry to exercise the back button against
- tapOn: 'Log in'
- extendedWaitUntil:
    visible: 'Welcome back'
    timeout: 10000

# Press hardware back button — should navigate back to the signup page
- back
- extendedWaitUntil:
    visible: 'Create your account'
    timeout: 10000

# Verify we returned to the previous page in history
- assertVisible: 'Create your account'
