appId: ai.hushbox.app
name: React app renders correctly in WebView
tags:
  - smoke
  - must
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize and WebView to render
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000

# Verify key UI elements rendered — proves the React app is working
- assertVisible: 'Sign up'
