appId: ai.hushbox.app
name: Status bar is styled correctly
tags:
  - must
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize — status bar is styled by useStatusBar hook
# which runs after CapacitorProvider mounts
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000

# Take a screenshot for visual verification of status bar styling.
# Maestro cannot programmatically inspect status bar color, but
# screenshots captured on failure provide visual evidence.
- takeScreenshot: maestro-results/status-bar-dark-theme
