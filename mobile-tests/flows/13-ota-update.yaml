appId: ai.hushbox.app
name: OTA update downloads and applies
tags:
  - must
androidWebViewHierarchy: devtools
---
# App installed with VITE_APP_VERSION=local-mobile-test.
# Server version overridden to ota-v2 by orchestrator.
# On launch, useLiveUpdate detects the mismatch, downloads the OTA bundle,
# and applies it via Capgo (silent reload). After reload, versions match
# and the app renders normally without an "Update Required" modal.

- launchApp:
    clearState: true

# useLiveUpdate fires on mount: detects version mismatch, downloads the
# OTA bundle from R2, and calls CapacitorUpdater.set() which reloads the
# app with the new bundle. After reload, versions match and no modal appears.
# Give the full cycle (download + Capgo reload) up to 60s on the emulator.
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 60000

# Silent update should have completed — no modal
- assertNotVisible: 'Update Required'

# Background + foreground to trigger onResume update check
- pressKey: home
- waitForAnimationToEnd:
    timeout: 3000
- launchApp:
    stopApp: false

# App should still be stable (no modal after resume)
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000
- assertNotVisible: 'Update Required'
