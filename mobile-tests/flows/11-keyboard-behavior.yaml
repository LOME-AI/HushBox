appId: ai.hushbox.app
name: Keyboard appears and input remains visible
tags:
  - should
androidWebViewHierarchy: devtools
---
- launchApp:
    clearState: true

# Wait for app to stabilize
- extendedWaitUntil:
    visible: 'Sign up'
    timeout: 15000

# Tap the prompt input to trigger the software keyboard
- tapOn:
    id: 'prompt-input'

# Verify app UI is still visible (not hidden behind keyboard)
- assertVisible: 'Sign up'

# Type a short string to verify input works. Kept under 12 characters
# because Maestro 2.6.0 stalls inputText at exactly the 12th character on
# docker-android (the WebView's input queue fills before Maestro can drain
# it, and the 120 s gRPC deadline fires). Maestro issue #2718.
- inputText: 'TestKeys'

# Dismiss keyboard
- hideKeyboard

# UI should still be visible after keyboard dismissal
- assertVisible: 'Sign up'
