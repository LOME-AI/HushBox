<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta
      name="description"
      content="One interface for every AI model. Chat with GPT, Claude, Gemini, and more. End-to-end encrypted. No subscriptions."
    />
    <!-- Paint the theme background before app CSS loads so there is no white
         flash (notably in dark mode / inside the marketing demo iframe). Values
         mirror the --background token in packages/config/tailwind/index.css. -->
    <style>
      :root {
        color-scheme: light dark;
        background-color: #faf9f6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          background-color: #1a1816;
        }
      }
    </style>
    <link
      rel="preload"
      href="/fonts/merriweather-latin.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>HushBox</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
