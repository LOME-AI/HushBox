# Wrangler configuration for Cloudflare Workers
# Local dev requires no Cloudflare credentials

name = "hushbox-api"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[dev]
local_protocol = "http"
[observability]
enabled = false

[limits]
cpu_ms = 30000
[durable_objects]
bindings = [{ name = "CONVERSATION_ROOM", class_name = "ConversationRoom" }]

[[migrations]]
tag = "v1"
new_classes = ["ConversationRoom"]
[[r2_buckets]]
binding = "APP_BUILDS"
bucket_name = "hushbox-app-builds"
[vars]
NODE_ENV = "production"
API_URL = "https://api.hushbox.ai"
FRONTEND_URL = "https://hushbox.ai"

# Secrets deployed via CI (GitHub Secrets → wrangler secret put):
# - DATABASE_URL
# - UPSTASH_REDIS_REST_URL
# - UPSTASH_REDIS_REST_TOKEN
# - OPAQUE_MASTER_SECRET
# - IRON_SESSION_SECRET
# - APP_VERSION
# - RESEND_API_KEY
# - FCM_PROJECT_ID
# - FCM_SERVICE_ACCOUNT_JSON
# - HELCIM_API_TOKEN
# - HELCIM_WEBHOOK_VERIFIER
