packages:
  - apps/*
  - packages/*
  - services/*
  - mocks/*
  - e2e
  - ops
  - scripts

overrides:
  # Dedupes sharp to a single copy; transitive consumers otherwise resolve
  # multiple versions, each bundling its own heavy native binary. Overrides must
  # live in this file (not package.json) for pnpm to apply them.
  sharp: ^0.34.5
  vite: npm:rolldown-vite@7.3.1

patchedDependencies:
  astro@5.18.0: patches/astro@5.18.0.patch
