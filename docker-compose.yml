name: ${COMPOSE_PROJECT_NAME:-hushbox}

services:
  postgres:
    image: postgres:18-alpine
    command: postgres -c max_connections=1000
    ports:
      - '${HB_POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hushbox
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/neondatabase/wsproxy:latest
    environment:
      APPEND_PORT: 'postgres:5432'
      ALLOW_ADDR_REGEX: '.*'
      LOG_TRAFFIC: 'true'
    ports:
      - '${HB_NEON_PORT:-4444}:80'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - '${HB_REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    ports:
      - '${HB_REDIS_HTTP_PORT:-8079}:80'
    environment:
      SRH_MODE: env
      SRH_TOKEN: local_dev_token
      SRH_CONNECTION_STRING: 'redis://redis:6379'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- --header="Authorization: Bearer local_dev_token" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    privileged: true
    devices:
      - /dev/kvm
    group_add:
      - '${HB_KVM_GID:-kvm}'
    ports:
      - '${HB_EMULATOR_ADB_PORT:-5555}:5555'
      - '${HB_EMULATOR_VNC_PORT:-6080}:6080'
    environment:
      EMULATOR_DEVICE: Samsung Galaxy S10
      WEB_VNC: 'true'
    profiles:
      - mobile

volumes:
  postgres_data:
