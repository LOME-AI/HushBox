name: ${COMPOSE_PROJECT_NAME:-hushbox}

services:
  postgres:
    image: postgres:18-alpine
    command: postgres -c max_connections=1000
    ports:
      - '${HB_POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hushbox
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  neon-proxy:
    image: ghcr.io/neondatabase/wsproxy:latest
    environment:
      APPEND_PORT: 'postgres:5432'
      ALLOW_ADDR_REGEX: '.*'
      # Per-byte traffic logging is pure CPU/IO overhead on an already-saturated
      # E2E host; off keeps the proxy from shedding connections under load.
      LOG_TRAFFIC: 'false'
    ports:
      - '${HB_NEON_PORT:-4444}:80'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - '${HB_REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    ports:
      - '${HB_REDIS_HTTP_PORT:-8079}:80'
    environment:
      SRH_MODE: env
      SRH_TOKEN: local_dev_token
      SRH_CONNECTION_STRING: 'redis://redis:6379'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- --header="Authorization: Bearer local_dev_token" --header="Content-Type: application/json" --post-data=''["PING"]'' http://127.0.0.1:80/ || exit 1',
        ]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '${HB_MINIO_API_PORT:-9000}:9000'
      - '${HB_MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 3s
      retries: 5

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/hushbox-media-dev || true
      "

  # android-emulator: managed by scripts/mobile-test.ts via direct `docker run`
  # so the script can scale to mobile-tests/config.ts SHARDS containers with
  # distinct per-shard ADB ports and names. Compose stays for the dev-stack
  # services above.

volumes:
  postgres_data:
  minio_data:
