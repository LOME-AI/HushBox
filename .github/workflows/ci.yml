name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  # ── Version computation (main only) ────────────────────
  version:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 3
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.compute.outputs.version }}
      version_name: ${{ steps.compute.outputs.version_name }}
      version_code: ${{ steps.compute.outputs.version_code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-blacksmith
      - name: Compute next version
        id: compute
        run: pnpm tsx scripts/compute-next-version.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Quick lint jobs (Blacksmith 2 vCPU) ──────────────────
  lint:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith
      - name: Generate Astro types
        run: pnpm --filter @hushbox/marketing exec astro sync
      - name: Lint
        run: pnpm lint

  typecheck:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith
      - name: Type check
        run: pnpm typecheck
      - name: Verify typecheck coverage
        run: pnpm verify:typecheck-coverage
      - name: Generate environment files
        run: pnpm generate:env
      - name: Drizzle migration drift check
        run: |
          pnpm --filter @hushbox/db db:generate
          git diff --exit-code packages/db/drizzle/ || (echo "Schema/snapshot drift. Run 'pnpm db:generate' and commit." && exit 1)

  duplication:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith
      - name: Check code duplication
        run: pnpm lint:duplication

  unused:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith
      - name: Generate environment files
        run: pnpm generate:env
      - name: Check unused code
        run: pnpm lint:unused

  gitleaks:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    environment: ci
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Test job (Blacksmith 4 vCPU + Docker) ────────────────
  test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    environment: ci
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith

      - name: Cache Turbo
        uses: useblacksmith/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.ref_name }}-
            turbo-main-

      - name: Cache Docker images
        uses: useblacksmith/stickydisk@v1
        with:
          key: docker-${{ hashFiles('docker-compose.yml') }}
          path: /tmp/docker-cache

      - name: Load cached Docker images
        run: |
          if ls /tmp/docker-cache/*.tar 1>/dev/null 2>&1; then
            echo "Loading cached Docker images..."
            for img in /tmp/docker-cache/*.tar; do
              docker load -i "$img" &
            done
            wait
          fi

      - name: Generate environment files
        run: pnpm generate:env --mode=ciVitest
        # BEGIN GENERATED: vitest-env
        env:
          AI_GATEWAY_API_KEY_RESTRICTED: ${{ secrets.AI_GATEWAY_API_KEY_RESTRICTED }}
          LINEAR_API_KEY_READ: ${{ secrets.LINEAR_API_KEY_READ }}
        # END GENERATED: vitest-env

      - name: Verify environment configuration
        run: pnpm verify:env --mode=ciVitest

      - name: Start database
        run: pnpm db:up

      - name: Save Docker images for next run
        run: |
          if ! ls /tmp/docker-cache/*.tar 1>/dev/null 2>&1; then
            mkdir -p /tmp/docker-cache
            docker save postgres:18-alpine -o /tmp/docker-cache/postgres.tar &
            docker save redis:7-alpine -o /tmp/docker-cache/redis.tar &
            docker save ghcr.io/neondatabase/wsproxy:latest -o /tmp/docker-cache/neon-proxy.tar &
            docker save hiett/serverless-redis-http:latest -o /tmp/docker-cache/serverless-redis.tar &
            docker save minio/minio:latest -o /tmp/docker-cache/minio.tar &
            docker save minio/mc:latest -o /tmp/docker-cache/minio-mc.tar &
            wait
          fi

      - name: Run migrations
        run: pnpm db:migrate

      # HTTP cassettes — restore prior recordings of AI Gateway calls so most
      # integration tests replay from disk instead of hitting the gateway.
      # `restore-keys` does prefix-fallback to the most-recent prior run; the
      # unique save key below is then appended below. Bumping AI_RECORDING_VERSION
      # in `apps/api/src/services/ai/cassette/cassette-store.ts` changes the
      # `v1` segment of the path and orphans old recordings. See docs/CI-CASSETTES.md.
      - name: Restore AI cassettes
        uses: actions/cache/restore@v4
        with:
          path: .ai-cassettes
          key: ai-cassettes-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ai-cassettes-v1-

      - name: Run tests
        run: pnpm test

      - name: Verify AI Gateway was called
        run: pnpm verify:evidence --require=ai-gateway

      - name: Verify Linear was called
        run: pnpm verify:evidence --require=linear

      # Save cassettes regardless of test outcome — fresh recordings from a
      # failed run are still valuable for the next attempt, and the cache key
      # is unique per run so a failed save doesn't poison main.
      - name: Save AI cassettes
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ai-cassettes
          key: ai-cassettes-v1-${{ github.run_id }}-${{ github.run_attempt }}

  # ── Build job (Blacksmith 4 vCPU) ────────────────────────
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 8
    environment: ci
    needs: [gitleaks, version]
    if: always() && needs.gitleaks.result == 'success' && (needs.version.result == 'success' || needs.version.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith

      - name: Cache Turbo
        uses: useblacksmith/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.ref_name }}-
            turbo-main-

      - name: Verify production environment
        run: pnpm verify:env --mode=production

      - name: Build
        run: pnpm build
        # BEGIN GENERATED: build-env
        env:
          VITE_API_URL: https://api.hushbox.ai
          VITE_HELCIM_JS_TOKEN: ${{ secrets.VITE_HELCIM_JS_TOKEN_PRODUCTION }}
          VITE_PLATFORM: web
          VITE_APP_VERSION: ${{ needs.version.outputs.version }}
        # END GENERATED: build-env

      - name: Merge marketing into web dist
        run: pnpm tsx scripts/merge-marketing-into-web.ts

      - name: Generate _headers (CSP hashes per marketing route)
        run: pnpm tsx scripts/generate-headers.ts
        env:
          # Must match the VITE_API_URL the marketing build used above so the
          # generated connect-src CSP allows the API origin the client bundles
          # actually fetch from.
          VITE_API_URL: https://api.hushbox.ai

      - name: Upload web build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: apps/web/dist

      - name: Build mobile OTA bundles (parallel)
        if: needs.version.result == 'success'
        run: |
          for platform in ios android android-direct; do
            (
              VITE_API_URL=https://api.hushbox.ai \
              VITE_HELCIM_JS_TOKEN="${VITE_HELCIM_JS_TOKEN}" \
              VITE_PLATFORM=$platform \
              VITE_APP_VERSION="${VITE_APP_VERSION}" \
              pnpm --filter web exec vite build --outDir dist-$platform
            ) &
          done
          wait
        env:
          VITE_HELCIM_JS_TOKEN: ${{ secrets.VITE_HELCIM_JS_TOKEN_PRODUCTION }}
          VITE_APP_VERSION: ${{ needs.version.outputs.version }}

      - name: Upload mobile build artifacts
        if: needs.version.result == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: mobile-dist
          path: |
            apps/web/dist-ios
            apps/web/dist-android
            apps/web/dist-android-direct

  # ── E2E tests (Blacksmith 4 vCPU + Docker + Playwright) ──
  e2e:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    environment: ci
    needs: [gitleaks]
    strategy:
      fail-fast: true
      matrix:
        include:
          - project: chromium
            browser: chromium
          - project: firefox
            browser: firefox
          - project: webkit
            browser: webkit
          - project: iphone-15
            browser: webkit
          - project: pixel-7
            browser: chromium
          - project: ipad-pro
            browser: webkit
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('./node_modules/@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Playwright version: $VERSION"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: useblacksmith/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ matrix.browser }}-

      - name: Cache Docker images
        uses: useblacksmith/stickydisk@v1
        with:
          key: docker-${{ hashFiles('docker-compose.yml') }}
          path: /tmp/docker-cache

      - name: Load cached Docker images
        run: |
          if ls /tmp/docker-cache/*.tar 1>/dev/null 2>&1; then
            for img in /tmp/docker-cache/*.tar; do
              docker load -i "$img" &
            done
            wait
          fi

      - name: Generate environment files
        run: pnpm generate:env --mode=ciE2E
        # BEGIN GENERATED: e2e-env
        env:
          HELCIM_API_TOKEN_SANDBOX: ${{ secrets.HELCIM_API_TOKEN_SANDBOX }}
          HELCIM_WEBHOOK_VERIFIER_SANDBOX: ${{ secrets.HELCIM_WEBHOOK_VERIFIER_SANDBOX }}
          VITE_HELCIM_JS_TOKEN_SANDBOX: ${{ secrets.VITE_HELCIM_JS_TOKEN_SANDBOX }}
        # END GENERATED: e2e-env

      - name: Verify environment configuration
        run: pnpm verify:env --mode=ciE2E

      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps ${{ matrix.browser }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install ${{ matrix.browser }}

      - name: Install Hookdeck CLI
        if: matrix.project == 'chromium'
        run: |
          npm install -g hookdeck-cli
          hookdeck version

      - name: Start database
        run: pnpm db:up

      - name: Save Docker images for next run
        run: |
          if ! ls /tmp/docker-cache/*.tar 1>/dev/null 2>&1; then
            mkdir -p /tmp/docker-cache
            docker save postgres:18-alpine -o /tmp/docker-cache/postgres.tar &
            docker save redis:7-alpine -o /tmp/docker-cache/redis.tar &
            docker save ghcr.io/neondatabase/wsproxy:latest -o /tmp/docker-cache/neon-proxy.tar &
            docker save hiett/serverless-redis-http:latest -o /tmp/docker-cache/serverless-redis.tar &
            docker save minio/minio:latest -o /tmp/docker-cache/minio.tar &
            docker save minio/mc:latest -o /tmp/docker-cache/minio-mc.tar &
            wait
          fi

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed test data
        run: pnpm db:seed

      - name: Start Hookdeck listener
        if: matrix.project == 'chromium'
        run: |
          hookdeck ci --api-key $HOOKDECK_API_KEY
          hookdeck listen 8787 helcim-sandbox --path /api/webhooks/payment --output compact 2>&1 | tee /tmp/hookdeck.log &
          for i in {1..60}; do
            if grep -q -E "(Listening|Webhook URL|forwarding)" /tmp/hookdeck.log 2>/dev/null; then
              echo "Hookdeck listener ready"
              cat /tmp/hookdeck.log
              break
            fi
            if grep -q -i "error\|unknown\|failed" /tmp/hookdeck.log 2>/dev/null; then
              echo "Hookdeck failed to start:"
              cat /tmp/hookdeck.log
              exit 1
            fi
            echo "Waiting for Hookdeck listener... ($i/60)"
            sleep 1
          done
          if ! grep -q -E "(Listening|Webhook URL|forwarding)" /tmp/hookdeck.log 2>/dev/null; then
            echo "Hookdeck failed to start within timeout"
            cat /tmp/hookdeck.log
            exit 1
          fi
        env:
          HOOKDECK_API_KEY: ${{ secrets.HOOKDECK_API_KEY }}

      # Tag-based gating via Playwright --grep-invert, which composes (AND) with
      # the project-level grepInvert in playwright.config.ts. CI always drops
      # @local-only (dev-mode-only tests); every project except chromium also
      # drops @webhook, so the full-payment flow runs on the chromium runner
      # alone (Hookdeck + Helcim sandbox are wired there only).
      - name: Run E2E tests (${{ matrix.project }})
        run: pnpm e2e --project=${{ matrix.project }} --grep-invert "$E2E_GREP_INVERT"
        env:
          CI: true
          SKIP_WEBHOOK_TESTS: ${{ matrix.project != 'chromium' && 'true' || '' }}
          E2E_GREP_INVERT: ${{ matrix.project == 'chromium' && '@local-only' || '@local-only|@webhook' }}

      - name: Verify Hookdeck was called
        if: matrix.project == 'chromium'
        run: pnpm verify:evidence --require=hookdeck

      - name: Verify Helcim was called
        if: matrix.project == 'chromium'
        run: pnpm verify:evidence --require=helcim

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

      - name: Cancel workflow run on failure
        if: failure()
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Mobile tests (Maestro + Android emulator via Docker) ──
  mobile-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    environment: ci
    needs: [gitleaks]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith

      - name: Cache Turbo
        uses: useblacksmith/cache@v5
        with:
          path: .turbo
          key: turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.ref_name }}-
            turbo-main-

      - name: Cache Android SDK
        uses: useblacksmith/cache@v5
        with:
          path: ~/Android/Sdk
          key: android-sdk-android-36-cmdtools-11076708

      - name: Cache Gradle
        uses: useblacksmith/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/web/android/gradle/wrapper/gradle-wrapper.properties', 'apps/web/android/**/*.gradle') }}
          restore-keys: |
            gradle-

      - name: Cache Maestro CLI
        uses: useblacksmith/cache@v5
        with:
          path: ~/.maestro
          key: maestro-cli

      - name: Generate environment files
        run: pnpm generate:env --mode=ciE2E
        # BEGIN GENERATED: e2e-env
        env:
          HELCIM_API_TOKEN_SANDBOX: ${{ secrets.HELCIM_API_TOKEN_SANDBOX }}
          HELCIM_WEBHOOK_VERIFIER_SANDBOX: ${{ secrets.HELCIM_WEBHOOK_VERIFIER_SANDBOX }}
          VITE_HELCIM_JS_TOKEN_SANDBOX: ${{ secrets.VITE_HELCIM_JS_TOKEN_SANDBOX }}
        # END GENERATED: e2e-env

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Logs into GHCR so the script can pull the warm content-hash image
      # pushed by push-mobile-emulator-image on main. PRs that change the
      # Dockerfile miss the registry and fall back to a local cold build,
      # which doesn't require login.
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start database
        run: pnpm db:up

      - name: Run migrations
        run: pnpm db:migrate

      - name: Seed test data
        run: pnpm db:seed

      - name: Run mobile tests
        run: pnpm mobile:test

      - name: Dump emulator logs
        if: failure()
        # Iterate every container matching the shard name prefix so this scales
        # automatically with mobile-tests/config.ts SHARDS — no need to update
        # CI when the constant changes.
        run: |
          docker ps -aq --filter "name=hushbox-mobile-emulator-shard-" | while read -r id; do
            [ -z "$id" ] && continue
            name=$(docker inspect --format '{{.Name}}' "$id" | sed 's|^/||')
            docker logs "$id" > "emulator-logs-$name.txt" 2>&1 || true
            docker inspect "$id" > "emulator-inspect-$name.json" 2>&1 || true
          done

      - name: Upload results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: maestro-results
          path: |
            maestro-results/
            emulator-logs-*.txt
            emulator-inspect-*.json
          retention-days: 7

      - name: Cancel workflow run on failure
        if: failure()
        run: gh run cancel ${{ github.run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Push mobile-emulator image to GHCR (in parallel with deploy) ──
  # Bakes mobile-tests/docker/ into a content-hashed image with an AVD
  # quick-boot snapshot and pushes to GHCR. Skips push when the content-hash
  # tag already exists in the registry (no-op when the Dockerfile didn't
  # change). Gated by the same checks as deploy so the registry only ever
  # holds artifacts that pass the full check suite.
  push-mobile-emulator-image:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    needs: [lint, typecheck, duplication, unused, test, build, e2e, mobile-test, version]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-blacksmith

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake and push mobile emulator image
        run: pnpm tsx scripts/bake-mobile-image.ts --push

  # ── Deploy (GitHub-hosted — hyper-secrets) ───────────────
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck, duplication, unused, test, build, e2e, mobile-test, version]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    # BEGIN GENERATED: ops-env
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
      API_URL: https://api.hushbox.ai
      FRONTEND_URL: https://hushbox.ai
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      OPAQUE_MASTER_SECRET: ${{ secrets.OPAQUE_MASTER_SECRET }}
      IRON_SESSION_SECRET: ${{ secrets.IRON_SESSION_SECRET }}
      APP_VERSION: ${{ needs.version.outputs.version }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_PRODUCTION }}
      PUBLIC_MODELS_URL: https://ai-gateway.vercel.sh/v1/models
      FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      HELCIM_API_TOKEN: ${{ secrets.HELCIM_API_TOKEN_PRODUCTION }}
      LINEAR_API_KEY_READ: ${{ secrets.LINEAR_API_KEY_READ }}
      HELCIM_WEBHOOK_VERIFIER: ${{ secrets.HELCIM_WEBHOOK_VERIFIER_PRODUCTION }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_MEDIA: hushbox-media
      R2_ADMIN_ACCESS_KEY_ID: ${{ secrets.R2_ADMIN_ACCESS_KEY_ID }}
      R2_ADMIN_SECRET_ACCESS_KEY: ${{ secrets.R2_ADMIN_SECRET_ACCESS_KEY }}
    # END GENERATED: ops-env
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Verify version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "ERROR: Version is empty"
            exit 1
          fi
          echo "Deploying version: $VERSION"

      - name: Download web build artifact
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy secrets to Workers
        working-directory: apps/api
        run: |
          # BEGIN GENERATED: deploy-secrets
          echo "${{ secrets.DATABASE_URL }}" | pnpm exec wrangler secret put DATABASE_URL
          echo "${{ secrets.UPSTASH_REDIS_REST_URL }}" | pnpm exec wrangler secret put UPSTASH_REDIS_REST_URL
          echo "${{ secrets.UPSTASH_REDIS_REST_TOKEN }}" | pnpm exec wrangler secret put UPSTASH_REDIS_REST_TOKEN
          echo "${{ secrets.OPAQUE_MASTER_SECRET }}" | pnpm exec wrangler secret put OPAQUE_MASTER_SECRET
          echo "${{ secrets.IRON_SESSION_SECRET }}" | pnpm exec wrangler secret put IRON_SESSION_SECRET
          echo "${{ needs.version.outputs.version }}" | pnpm exec wrangler secret put APP_VERSION
          echo "${{ secrets.RESEND_API_KEY }}" | pnpm exec wrangler secret put RESEND_API_KEY
          echo "${{ secrets.AI_GATEWAY_API_KEY_PRODUCTION }}" | pnpm exec wrangler secret put AI_GATEWAY_API_KEY
          echo "${{ secrets.FCM_PROJECT_ID }}" | pnpm exec wrangler secret put FCM_PROJECT_ID
          echo "${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}" | pnpm exec wrangler secret put FCM_SERVICE_ACCOUNT_JSON
          echo "${{ secrets.HELCIM_API_TOKEN_PRODUCTION }}" | pnpm exec wrangler secret put HELCIM_API_TOKEN
          echo "${{ secrets.LINEAR_API_KEY_READ }}" | pnpm exec wrangler secret put LINEAR_API_KEY_READ
          echo "${{ secrets.HELCIM_WEBHOOK_VERIFIER_PRODUCTION }}" | pnpm exec wrangler secret put HELCIM_WEBHOOK_VERIFIER
          echo "${{ secrets.R2_S3_ENDPOINT }}" | pnpm exec wrangler secret put R2_S3_ENDPOINT
          echo "${{ secrets.R2_ACCESS_KEY_ID }}" | pnpm exec wrangler secret put R2_ACCESS_KEY_ID
          echo "${{ secrets.R2_SECRET_ACCESS_KEY }}" | pnpm exec wrangler secret put R2_SECRET_ACCESS_KEY
          # END GENERATED: deploy-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify secrets deployed
        working-directory: apps/api
        run: |
          secrets=$(pnpm exec wrangler secret list)
          # BEGIN GENERATED: verify-secrets
          for secret in DATABASE_URL UPSTASH_REDIS_REST_URL UPSTASH_REDIS_REST_TOKEN OPAQUE_MASTER_SECRET IRON_SESSION_SECRET APP_VERSION RESEND_API_KEY AI_GATEWAY_API_KEY FCM_PROJECT_ID FCM_SERVICE_ACCOUNT_JSON HELCIM_API_TOKEN LINEAR_API_KEY_READ HELCIM_WEBHOOK_VERIFIER R2_S3_ENDPOINT R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY; do
          # END GENERATED: verify-secrets
            if ! echo "$secrets" | grep -q "$secret"; then
              echo "ERROR: Secret $secret not found in Workers"
              exit 1
            fi
          done
          echo "All required secrets verified"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Resolve any `run-script:<name>` labels on the merged PR against
      # ops/manifest.yml, validate them, and partition by phase. Outputs
      # JSON arrays consumed by the pre-deploy and post-deploy steps below.
      # See ops/README.md for the trust model.
      #
      # Implemented as a tsx script (not actions/github-script) so the
      # workspace's js-yaml is resolvable — pnpm doesn't hoist devDeps to
      # the repo root.
      - name: Resolve ops scripts from PR labels
        id: ops
        run: pnpm tsx ops/lib/resolve-pr-scripts.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Run pre-deploy ops scripts
        if: steps.ops.outputs.pre != '' && steps.ops.outputs.pre != '[]'
        run: |
          echo '${{ steps.ops.outputs.pre }}' | jq -c '.[]' | while read -r s; do
            name=$(echo "$s" | jq -r '.name')
            file=$(echo "$s" | jq -r '.file')
            echo "::group::Pre-deploy ops script: $name ($file)"
            pnpm tsx "$file"
            echo "::endgroup::"
          done

      - name: Run database migrations (production)
        run: pnpm --filter @hushbox/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy API to Workers
        working-directory: apps/api
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Web to Pages
        working-directory: apps/web
        run: pnpm exec wrangler pages deploy dist --project-name=hushbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Run post-deploy ops scripts
        if: steps.ops.outputs.post != '' && steps.ops.outputs.post != '[]'
        run: |
          echo '${{ steps.ops.outputs.post }}' | jq -c '.[]' | while read -r s; do
            name=$(echo "$s" | jq -r '.name')
            file=$(echo "$s" | jq -r '.file')
            echo "::group::Post-deploy ops script: $name ($file)"
            pnpm tsx "$file"
            echo "::endgroup::"
          done

      - name: Verify API health
        run: |
          sleep 10
          curl -f https://hushbox-api.${{ vars.WORKERS_SUBDOMAIN }}.workers.dev/api/health || exit 1

      - name: Download mobile build artifacts
        uses: actions/download-artifact@v7
        with:
          name: mobile-dist
          path: apps/web

      - name: Upload mobile OTA bundles to R2
        working-directory: apps/api
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for platform in ios android android-direct; do
            (cd ../../apps/web/dist-$platform && zip -r ../../../${platform}-dist.zip .)
            pnpm exec wrangler r2 object put \
              "hushbox-app-builds/builds/$platform/$VERSION.zip" \
              --file ../../${platform}-dist.zip --remote
            echo "Uploaded builds/$platform/$VERSION.zip"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Tag release
        run: |
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
        env:
          HUSKY: '0'
