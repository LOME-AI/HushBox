name: Experimental Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Prepare: extract version ──────────────────────────
  prepare:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Get latest version
        id: tag
        run: |
          TAG=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tags found — has ci.yml deployed at least once?"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: pnpm tsx scripts/extract-version.ts
        env:
          INPUT_VERSION: ${{ steps.tag.outputs.tag }}

  # ── Build APK + GitHub Pre-Release ────────────────────
  build-apk:
    needs: [prepare]
    uses: ./.github/workflows/build-android-apk.yml
    with:
      version-name: ${{ needs.prepare.outputs.version_name }}
      version-code: ${{ needs.prepare.outputs.version_code }}
      version: ${{ needs.prepare.outputs.version }}
      prerelease: true
      release-title-suffix: ' (Experimental)'
    secrets: inherit
