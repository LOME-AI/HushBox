name: Run ops script

# Manually run one ops script from ops/manifest.yml against production, gated by
# the `production` environment's required reviewer. This is the dispatchable
# alternative to the PR-label flow (see ops/README.md): no PR or merge needed.
#
# Two sections are generated — do not edit them by hand:
#   - the script dropdown:  `pnpm generate:ops-dispatch` (ops/lib/generate-dispatch-options.ts)
#   - the secret env block:  `pnpm generate:env`          (scripts/generate-env.ts)
# A CI drift gate fails if either is out of sync with its source of truth.

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Ops script to run (from ops/manifest.yml)'
        required: true
        type: choice
        options:
          # BEGIN GENERATED: ops-dispatch-options
          - configure-r2-cors
          # END GENERATED: ops-dispatch-options

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    # BEGIN GENERATED: ops-dispatch-env
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NODE_ENV: production
      API_URL: https://api.hushbox.ai
      FRONTEND_URL: https://hushbox.ai
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      OPAQUE_MASTER_SECRET: ${{ secrets.OPAQUE_MASTER_SECRET }}
      IRON_SESSION_SECRET: ${{ secrets.IRON_SESSION_SECRET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_PRODUCTION }}
      PUBLIC_MODELS_URL: https://ai-gateway.vercel.sh/v1/models
      FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
      FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
      HELCIM_API_TOKEN: ${{ secrets.HELCIM_API_TOKEN_PRODUCTION }}
      LINEAR_API_KEY_READ: ${{ secrets.LINEAR_API_KEY_READ }}
      HELCIM_WEBHOOK_VERIFIER: ${{ secrets.HELCIM_WEBHOOK_VERIFIER_PRODUCTION }}
      R2_S3_ENDPOINT: ${{ secrets.R2_S3_ENDPOINT }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_MEDIA: hushbox-media
    # END GENERATED: ops-dispatch-env
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      # Resolve the selected name against ops/manifest.yml and validate its
      # required secrets are present — same checks as the PR-label flow.
      - name: Resolve and validate ops script
        id: resolve
        run: pnpm tsx ops/lib/resolve-dispatch-script.ts
        env:
          OPS_SCRIPT: ${{ inputs.script }}

      - name: Run ops script
        run: pnpm tsx "${{ steps.resolve.outputs.file }}"
