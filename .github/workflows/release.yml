name: Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Deploy target'
        type: choice
        required: true
        options:
          - github
          - play_store
          - apple_store
          - all
      track:
        description: 'Release track (see validation rules)'
        type: choice
        required: true
        options:
          - production
          - internal
          - experimental
          - manual

permissions:
  contents: write

jobs:
  # ── Validate (platform, track) combination ─────────────
  # Valid:
  #   (github, production | internal | experimental)
  #   (play_store | apple_store, production | internal | manual)
  #   (all, production | internal)
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate input combination
        env:
          PLATFORM: ${{ inputs.platform }}
          TRACK: ${{ inputs.track }}
        run: |
          if [ "$TRACK" = "experimental" ] && [ "$PLATFORM" != "github" ]; then
            echo "::error::track=experimental requires platform=github (got platform=$PLATFORM)"
            exit 1
          fi
          if [ "$TRACK" = "manual" ] && { [ "$PLATFORM" = "github" ] || [ "$PLATFORM" = "all" ]; }; then
            echo "::error::track=manual requires platform=play_store or platform=apple_store (got platform=$PLATFORM)"
            exit 1
          fi
          echo "OK: platform=$PLATFORM, track=$TRACK"

  # ── Version extraction (needed by every downstream job) ─
  prepare-version:
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Get latest version
        id: tag
        run: |
          TAG=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tags found — has ci.yml deployed at least once?"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      - name: Extract version
        id: version
        run: pnpm tsx scripts/extract-version.ts
        env:
          INPUT_VERSION: ${{ steps.tag.outputs.tag }}

  # ── Web build artifact (only needed by iOS path) ───────
  prepare-web:
    needs: [prepare-version]
    if: |
      (inputs.platform == 'apple_store' || inputs.platform == 'all')
      && inputs.track != 'experimental'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build web
        run: pnpm build
        # BEGIN GENERATED: build-env-web-release
        env:
          VITE_API_URL: https://api.hushbox.ai
          VITE_HELCIM_JS_TOKEN: ${{ secrets.VITE_HELCIM_JS_TOKEN_PRODUCTION }}
          VITE_PLATFORM: web
          VITE_APP_VERSION: ${{ needs.prepare-version.outputs.version }}
        # END GENERATED: build-env-web-release
      - name: Merge marketing into web dist
        run: cp -r apps/marketing/dist/* apps/web/dist/
      - name: Upload web build artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist

  # ── iOS: TestFlight / App Store submit / IPA artifact ──
  ios:
    needs: [prepare-version, prepare-web]
    if: |
      (inputs.platform == 'apple_store' || inputs.platform == 'all')
      && inputs.track != 'experimental'
    uses: ./.github/workflows/build-ios.yml
    with:
      version-name: ${{ needs.prepare-version.outputs.version_name }}
      version-code: ${{ needs.prepare-version.outputs.version_code }}
      output: ${{ inputs.track == 'production' && 'app-store-submit' || inputs.track == 'manual' && 'ipa-artifact' || 'testflight' }}
    secrets: inherit

  # ── Android Play Store: AAB → track or artifact ────────
  android-play:
    needs: [prepare-version]
    if: |
      (inputs.platform == 'play_store' || inputs.platform == 'all')
      && inputs.track != 'experimental'
    uses: ./.github/workflows/build-android.yml
    with:
      version-name: ${{ needs.prepare-version.outputs.version_name }}
      version-code: ${{ needs.prepare-version.outputs.version_code }}
      version: ${{ needs.prepare-version.outputs.version }}
      vite-platform: android
      output: ${{ inputs.track == 'manual' && 'aab-artifact' || 'aab-play-upload' }}
      play-track: ${{ inputs.track == 'production' && 'production' || 'internal' }}
    secrets: inherit

  # ── Android GitHub: APK + Release (production/internal/experimental) ─
  android-github:
    needs: [prepare-version]
    if: inputs.platform == 'github' || inputs.platform == 'all'
    uses: ./.github/workflows/build-android.yml
    with:
      version-name: ${{ needs.prepare-version.outputs.version_name }}
      version-code: ${{ needs.prepare-version.outputs.version_code }}
      version: ${{ needs.prepare-version.outputs.version }}
      vite-platform: ${{ inputs.track == 'internal' && 'android' || 'android-direct' }}
      output: apk-github-release
      github-release-prerelease: ${{ inputs.track != 'production' }}
      github-release-title-suffix: ${{ inputs.track == 'internal' && ' (Internal)' || inputs.track == 'experimental' && ' (Experimental)' || '' }}
    secrets: inherit
