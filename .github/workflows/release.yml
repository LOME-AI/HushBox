name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Prepare: build web + extract version ────────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    environment: production
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup

      - name: Get latest version
        id: tag
        run: |
          TAG=$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$TAG" ]; then
            echo "No version tags found — has ci.yml deployed at least once?"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: pnpm tsx scripts/extract-version.ts
        env:
          INPUT_VERSION: ${{ steps.tag.outputs.tag }}

      - name: Build web
        run: pnpm build
        # BEGIN GENERATED: build-env-web-release
        env:
          VITE_API_URL: https://api.hushbox.ai
          VITE_HELCIM_JS_TOKEN: ${{ secrets.VITE_HELCIM_JS_TOKEN_PRODUCTION }}
          VITE_OPAQUE_SERVER_ID: hushbox.ai
          VITE_PLATFORM: web
          VITE_APP_VERSION: ${{ steps.version.outputs.version }}
        # END GENERATED: build-env-web-release

      - name: Merge marketing into web dist
        run: cp -r apps/marketing/dist/* apps/web/dist/

      - name: Upload web build artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: apps/web/dist

  # ── iOS: Build + App Store upload ───────────────────────
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 15
    needs: [prepare]
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Download web build artifact
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/web/ios

      - name: Sync iOS
        working-directory: apps/web
        run: npx cap sync ios

      - name: Set iOS version
        working-directory: apps/web/ios/App
        run: |
          agvtool new-marketing-version ${{ needs.prepare.outputs.version_name }}
          agvtool new-version -all ${{ needs.prepare.outputs.version_code }}

      - name: Build and upload to App Store
        working-directory: apps/web/ios
        run: bundle exec fastlane release
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

  # ── Android Play Store: Build AAB + upload ──────────────
  build-android-play:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [prepare]
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        run: echo "$KEYSTORE_B64" | base64 -d > /tmp/hushbox-release.jks
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build web for Android
        run: pnpm --filter web build
        # BEGIN GENERATED: build-env-android-play
        env:
          VITE_API_URL: https://api.hushbox.ai
          VITE_HELCIM_JS_TOKEN: ${{ secrets.VITE_HELCIM_JS_TOKEN_PRODUCTION }}
          VITE_OPAQUE_SERVER_ID: hushbox.ai
          VITE_PLATFORM: android
          VITE_APP_VERSION: ${{ needs.prepare.outputs.version }}
        # END GENERATED: build-env-android-play

      - name: Sync Android
        working-directory: apps/web
        run: npx cap sync android

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/web/android

      - name: Build and upload to Play Store
        working-directory: apps/web/android
        run: bundle exec fastlane play_store
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
          ANDROID_KEYSTORE_PATH: /tmp/hushbox-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ needs.prepare.outputs.version_code }}
          VERSION_NAME: ${{ needs.prepare.outputs.version_name }}

  # ── Android Obtainium: Build APK + GitHub Release ───────
  build-android-obtainium:
    needs: [prepare]
    uses: ./.github/workflows/build-android-apk.yml
    with:
      version-name: ${{ needs.prepare.outputs.version_name }}
      version-code: ${{ needs.prepare.outputs.version_code }}
      version: ${{ needs.prepare.outputs.version }}
      prerelease: false
    secrets: inherit
